name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.36.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          mv kubectl /usr/local/bin/kubectl

      - name: Setup kubeconfig
        run: |
          mkdir -p /root/.kube
          echo "${{ secrets.KUBECONFIG }}" > /root/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl create configmap portfolio-files \
            --from-file=index.html \
            --from-file=css/style.css \
            -n portfolio --dry-run -o yaml | kubectl apply -f -
          kubectl rollout restart deployment/portfolio -n portfolio
          kubectl rollout status deployment/portfolio -n portfolio
