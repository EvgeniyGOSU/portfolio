stages:
  - deploy

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    # Удаляем старый ConfigMap (опционально)
    - kubectl delete configmap portfolio-files -n default --ignore-not-found=true
    # Создаём новый ConfigMap с HTML и CSS
    - kubectl create configmap portfolio-files --from-file=index.html --from-file=css/style.css -n default
    # Перезапускаем deployment
    - kubectl rollout restart deployment/portfolio -n default
    - kubectl rollout status deployment/portfolio -n default
  only:
    - main